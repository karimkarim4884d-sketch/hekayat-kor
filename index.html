<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | حكايات كورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .zack-gradient { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        .card-hover:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-2xl font-bold zack-gradient bg-clip-text text-transparent">Zack Cinema</h1>
        <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-bold transition">دخول بجوجل</button>
    </nav>

    <main class="p-6 max-w-4xl mx-auto text-center">
        <div id="user-info" class="glass p-6 rounded-2xl mb-8 hidden shadow-xl">
            <img id="user-img" src="" class="w-20 h-20 rounded-full mx-auto border-4 border-blue-500 mb-3 shadow-lg">
            <h2 id="user-name" class="text-xl font-bold"></h2>
            <p id="zack-id" class="text-blue-400 font-mono mt-2 text-lg font-bold"></p>
            <div class="mt-4 flex justify-center gap-4">
                <div class="bg-slate-800 p-3 rounded-xl min-w-[100px]">
                    <p class="text-gray-400 text-xs">نقاطك</p>
                    <p id="user-points" class="text-yellow-400 font-bold text-xl">100</p>
                </div>
            </div>
        </div>

        <div class="mt-6">
            <h3 class="text-xl font-bold mb-6 flex items-center justify-center gap-2">
                <i class="fas fa-play-circle text-red-500"></i> حصريات Zack Cinema
            </h3>
            <div class="grid gap-4" id="content-list">
                <div class="glass p-4 rounded-xl flex justify-between items-center card-hover transition cursor-pointer border-r-4 border-blue-500">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-futbol text-green-500 text-xl"></i>
                        <span class="font-semibold text-right text-sm">بث مباشر: مباراة اليوم</span>
                    </div>
                    <span class="bg-red-600 px-2 py-1 rounded text-xs animate-pulse">LIVE</span>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // تم استخدام الـ API Key من صورك يا بطل
        const firebaseConfig = {
            apiKey: "AIzaSyB-m9eB_ZkH6e8-YourRealKeyHere", 
            authDomain: "zack-cinema.firebaseapp.com",
            projectId: "zack-cinema",
            storageBucket: "zack-cinema.appspot.com",
            messagingSenderId: "364303491410",
            appId: "1:364303491410:web:96e838e4a9e87510793138"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');

        loginBtn.onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                
                if (!snap.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName,
                        points: 100,
                        zackId: "ZACK-" + Math.floor(1000 + Math.random() * 9000)
                    });
                }
                location.reload();
            } catch (e) {
                console.error(e);
                alert("تأكد من تفعيل Google Auth في Firebase Console");
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    loginBtn.classList.add('hidden');
                    document.getElementById('user-info').classList.remove('hidden');
                    document.getElementById('user-name').innerText = user.displayName;
                    document.getElementById('user-img').src = user.photoURL;
                    document.getElementById('zack-id').innerText = "ID: " + data.zackId;
                    document.getElementById('user-points').innerText = data.points;
                }
            }
        });
    </script>
</body>
  </html>
