<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | System</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --main-red: #ed1c24; --dark-bg: #050505; --card-bg: #121212; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; }
        header { background: var(--card-bg); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; font-size: 22px; }
        .logo span { color: var(--main-red); }
        .menu-btn { font-size: 28px; cursor: pointer; color: var(--main-red); background: none; border: none; }
        
        /* تصميم المنيو الجانبية */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; right: 0; background-color: #0d0d0d; overflow-x: hidden; transition: 0.4s; padding-top: 20px; box-shadow: -10px 0 20px rgba(0,0,0,0.8); }
        .sidenav a, .menu-section-title { padding: 12px 20px; text-decoration: none; font-size: 16px; color: #bbb; display: block; border-bottom: 1px solid #1a1a1a; }
        .menu-section-title { color: var(--main-red); font-weight: bold; background: #111; }
        .user-box { padding: 15px; background: #1a1a1a; margin-bottom: 10px; text-align: center; }
        .login-btn { background: white; color: black; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #install-app-btn { position: fixed; bottom: 20px; left: 20px; z-index: 999; background: var(--main-red); color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; display: none; box-shadow: 0 5px 15px rgba(237, 28, 36, 0.4); }
        .match-card { background: var(--card-bg); margin: 10px; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Zack <span>Cinema</span></div>
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
    </header>

    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()" style="font-size:30px; text-align: left;">&times;</a>
        
        <div class="user-box" id="user-section">
            <button class="login-btn" onclick="loginWithGoogle()">
                 تسجيل دخول بجوجل
            </button>
        </div>
