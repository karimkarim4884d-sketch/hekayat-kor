<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim Khaled | KR Zack Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #eab308; --dark-bg: #020617; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .kr-logo { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 290px; height: 100%; background: #0f172a; transition: 0.5s; z-index: 200; border-left: 2px solid var(--gold); }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 150; backdrop-filter: blur(4px); }
        .video-box { position: sticky; top: 0; z-index: 100; background: #000; border-bottom: 3px solid var(--gold); width: 100%; aspect-ratio: 16/9; }
        video, iframe { width: 100%; height: 100%; background: #000; }
        .ostora-card { background: #1e293b; border-radius: 15px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid rgba(234, 179, 8, 0.1); position: relative; height: 170px; }
        .nav-tab { background: #1e293b; color: #94a3b8; padding: 12px 18px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .nav-tab.active { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
        .admin-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172a; padding: 30px; border-radius: 25px; border: 2px solid var(--gold); z-index: 300; display: none; width: 92%; max-width: 420px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-2xl mx-auto pb-24">

    <div id="mainApp">
        <div class="video-box" id="mediaPlayer">
            <video id="vPlayer" controls autoplay playsinline class="w-full h-full"></video>
        </div>

        <div class="p-4 bg-[#0f172a] flex justify-between items-center border-b border-yellow-500/20 shadow-2xl">
            <button onclick="toggleSidebar()" class="text-yellow-500 text-2xl"><i class="fas fa-bars"></i></button>
            <div class="text-center">
                <h1 class="text-[16px] font-black text-yellow-500 italic uppercase tracking-wider">KARIM KHALED</h1>
                <p id="streamName" class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.2em]">Zack Cinema Engine</p>
            </div>
            <img src="https://raw.githubusercontent.com/ZackCinema/ZK/main/ZK.png" onerror="this.src='https://via.placeholder.com/100/eab308/000000?text=KR'" class="kr-logo">
        </div>

        <div class="p-4">
            <div class="flex gap-3 overflow-x-auto mb-6 pb-2">
                <button onclick="setTab('quran', this)" class="nav-tab active">🕋 قرآن كريم</button>
                <button onclick="setTab('live', this)" class="nav-tab">⚽ بث مباشر</button>
                <button onclick="setTab('ramadan', this)" class="nav-tab">🌙 رمضان</button>
                <button onclick="setTab('movies', this)" class="nav-tab">🎬 أفلام</button>
                <button onclick="setTab('kids', this)" class="nav-tab">🧸 كرتون</button>
                <button onclick="setTab('music', this)" class="nav-tab">🎵 أغاني</button>
            </div>
            <div id="contentGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <div id="adminModal" class="admin-modal shadow-[0_0_50px_rgba(0,0,0,1)]">
        <h3 class="text-center font-black mb-6 text-yellow-500 text-xl uppercase italic tracking-widest">KR ADMIN ACCESS</h3>
        
        <div id="loginSection">
            <input type="text" id="userInp" placeholder="اسم المستخدم" class="w-full p-4 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-center outline-none focus:border-yellow-500 transition-all">
            <input type="password" id="passInp" placeholder="كلمة المرور" class="w-full p-4 mb-6 bg-slate-900 border border-slate-700 rounded-xl text-white text-center outline-none focus:border-yellow-500 transition-all">
            <button onclick="checkAdmin()" class="w-full bg-yellow-500 text-black p-4 rounded-xl font-black uppercase shadow-lg active:scale-95 transition-all">دخول وحفظ البيانات</button>
        </div>

        <div id="addSection" class="hidden">
            <input type="text" id="mName" placeholder="اسم المحتوى" class="w-full p-4 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-right outline-none">
            <input type="text" id="mUrl" placeholder="رابط السيرفر" class="w-full p-4 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-right outline-none">
            <input type="text" id="mImg" placeholder="رابط البوستر" class="w-full p-4 mb-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-right outline-none">
            
            <select id="mCat" class="w-full p-4 mb-6 bg-slate-900 border border-slate-700 rounded-xl text-white text-right outline-none">
                <option value="quran">القرآن الكريم</option>
                <option value="live">بث مباشر</option>
                <option value="ramadan">رمضان</option>
                <option value="movies">أفلام</option>
                <option value="kids">كرتون</option>
                <option value="music">أغاني</option>
            </select>
            
            <div class="flex gap-3">
                <button onclick="addItem()" class="flex-1 bg-green-600 p-4 rounded-xl text-white font-black uppercase shadow-lg">إضافة</button>
                <button onclick="closeAdmin()" class="flex-1 bg-red-600 p-4 rounded-xl text-white font-black uppercase shadow-lg">إلغاء</button>
            </div>
            <button onclick="logoutAdmin()" class="w-full mt-6 text-gray-600 text-[9px] uppercase font-bold italic border-t border-white/5 pt-4">تسجيل الخروج ومسح الذاكرة</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar p-8 flex flex-col justify-between">
        <div class="text-center">
            <p class="text-2xl font-black text-yellow-500 uppercase italic tracking-tighter">KARIM KHALED</p>
            <div class="flex flex-col gap-4 mt-12">
                <button onclick="openAdmin()" class="bg-yellow-500 text-black p-5 rounded-2xl text-sm font-black flex items-center justify-between shadow-2xl active:scale-95 transition-all">
                    <span>لوحة التحكم</span> <i class="fas fa-lock"></i>
                </button>
            </div>
        </div>
        <button onclick="toggleSidebar()" class="w-full p-4 bg-red-600/10 text-red-500 rounded-2xl text-[10px] font-black uppercase tracking-widest">إغلاق القائمة</button>
    </div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <script>
        // دمج قاعدة البيانات في مفتاح واحد موحد
        let db = JSON.parse(localStorage.getItem('kr_zack_final_db')) || [];
        let currentTab = 'quran';
        const hls = new Hls();

        window.onload = () => {
            render();
            // تذكر الدخول تلقائياً
            if(localStorage.getItem('kr_logged_in') === 'true') {
                showAddSection();
            }
        };

        function checkAdmin() {
            const u = document.getElementById('userInp').value;
            const p = document.getElementById('passInp').value;
            if(u === 'admin' && p === 'admin') {
                localStorage.setItem('kr_logged_in', 'true');
                showAddSection();
            } else { alert("عذراً، البيانات خاطئة!"); }
        }

        function showAddSection() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('addSection').classList.remove('hidden');
        }

        function logoutAdmin() {
            localStorage.removeItem('kr_logged_in');
            location.reload();
        }

        function smartPlay(url, name) {
            document.getElementById('streamName').innerText = "PLAYING: " + name;
            const container = document.getElementById('mediaPlayer');
            if (url.includes('.m3u8') || url.includes('.mp4')) {
                container.innerHTML = '<video id="vPlayer" controls autoplay playsinline class="w-full h-full"></video>';
                const video = document.getElementById('vPlayer');
                if (Hls.isSupported()) { hls.loadSource(url); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play()); }
                else { video.src = url; video.play(); }
            } else { container.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen allow="autoplay"></iframe>`; }
        }

        function render() {
            const grid = document.getElementById('contentGrid');
            const items = db.filter(i => i.cat === currentTab);
            grid.innerHTML = items.length ? items.map((i, index) => `
                <div onclick="smartPlay('${i.url}', '${i.name}')" class="ostora-card group">
                    <img src="${i.img || 'https://via.placeholder.com/300x450/1e293b/eab308?text=KR+Cinema'}" class="w-full h-full object-cover opacity-30 group-hover:opacity-50 transition-all">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent flex flex-col justify-end p-4">
                        <p class="text-[11px] font-black text-yellow-500 truncate uppercase tracking-tighter">${i.name}</p>
                        <p class="text-[7px] text-gray-500 font-bold uppercase mb-2">Premium KR Server</p>
                        <button onclick="event.stopPropagation(); deleteItem('${i.name}')" class="text-red-600 text-[10px] w-fit hover:scale-125 transition-all"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('') : '<div class="col-span-3 text-center py-24 opacity-20"><i class="fas fa-folder-open text-4xl mb-4"></i><p class="text-[9px] font-black uppercase italic">لا يوجد محتوى حالياً</p></div>';
        }

        function deleteItem(name) {
            if(confirm("هل تريد حذف هذا المحتوى نهائياً؟")) {
                db = db.filter(i => i.name !== name);
                localStorage.setItem('kr_zack_final_db', JSON.stringify(db));
                render();
            }
        }

        function setTab(cat, btn) {
            currentTab = cat;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function openAdmin() { document.getElementById('adminModal').style.display = 'block'; toggleSidebar(); }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none'; }

        function addItem() {
            const name = document.getElementById('mName').value;
            const url = document.getElementById('mUrl').value;
            const img = document.getElementById('mImg').value;
            const cat = document.getElementById('mCat').value;
            if(name && url) {
                db.unshift({name, url, img, cat});
                localStorage.setItem('kr_zack_final_db', JSON.stringify(db));
                alert("تمت الإضافة بنجاح إلى قسم " + cat);
                document.getElementById('mName').value = '';
                document.getElementById('mUrl').value = '';
                document.getElementById('mImg').value = '';
                render();
            }
        }
    </script>
</body>
</html>
