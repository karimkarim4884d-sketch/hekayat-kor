<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حكايات كورة</title>
    <style>
        body { background-color: #0b0b0b; color: white; text-align: center; padding-top: 50px; font-family: Arial; }
        .box { border: 2px solid #ed1c24; padding: 30px; border-radius: 20px; display: inline-block; background: #1a1a1a; }
        h1 { color: #ed1c24; margin-bottom: 10px; }
        .score { font-size: 3em; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>حكايات كورة</h1>
        <p>{{ info.title }}</p>
        <div class="score">{{ info.score }}</div>
        <div style="background: #ed1c24; padding: 5px; border-radius: 10px;">{{ info.status }}</div>
    </div>
</body>
</html>
