<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكاية كورة - البث المباشر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #22c55e; font-size: 1.5rem; margin-bottom: 10px; }
        
        /* مكان مشغل الفيديو */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; background: #000; border: 2px solid #334155; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 0.9rem; transition: 0.3s; color: white; border: none; }
        .wa-main { background: #25d366; }
        .wa-support { background: #3b82f6; }
        .live-badge { background: red; color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
        footer { margin-top: 20px; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ حكاية كورة <span class="live-badge">مباشر الآن</span></h1>
        
        <div class="video-container">
            <iframe src="https://www.yalla-shoot.com/" frameborder="0" allowfullscreen></iframe>
        </div>

        <p style="margin-top: 15px; font-size: 0.9rem; color: #cbd5e1;">إذا توقف البث، قم بتحديث الصفحة أو تواصل مع الدعم</p>

        <div class="buttons">
            <a href="https://wa.me/201040077271" class="btn wa-main" target="_blank">💬 اطلب اشتراك</a>
            <a href="https://wa.me/201003442771" class="btn wa-support" target="_blank">🛠️ الدعم الفني</a>
        </div>
        
        <footer>Zack Cinema © 2026</footer>
    </div>
</body>
</html>
