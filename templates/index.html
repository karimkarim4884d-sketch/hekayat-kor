<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack Cinema | حكايات كورة</title>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: Arial, sans-serif; margin: 0; padding: 15px; text-align: center; }
        .section { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        h2 { color: #ed1c24; font-size: 1.2em; margin-top: 0; }
        .btn { display: inline-block; padding: 10px 15px; margin: 5px; border-radius: 5px; text-decoration: none; font-weight: bold; color: white; font-size: 14px; }
        .whatsapp { background: #25d366; } .telegram { background: #0088cc; } .sms { background: #444; }
        input { padding: 10px; width: 90%; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: white; }
        .sub-btn { background: #ed1c24; color: white; border: none; width: 90%; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="section">
        <h2>🔴 مباشر الآن</h2>
        <p>{{ info.title }}</p>
        <div style="font-size: 2em; font-weight: bold; color: #ed1c24;">{{ info.score }}</div>
    </div>

    <div class="section">
        <h2>📊 نتائج الماتشات</h2>
        <p>جاري تحديث جدول النتائج...</p>
    </div>

    <div class="section">
        <h2>🛠️ الدعم الفني</h2>
        <a href="https://wa.me/201040077271" class="btn whatsapp">واتساب</a>
        <a href="sms:+201003442771" class="btn sms">رسائل SMS</a>
        <br>
        <a href="https://t.me/YourChannel" class="btn telegram">قناة التلجرام</a>
    </div>

    <div class="section" style="border: 2px dashed #ed1c24;">
        <h2>💳 اشتراك (20 ج/شهر)</h2>
        <p>فودافون كاش: <span style="color: #ed1c24; font-weight: bold;">01032447101</span></p>
        <form>
            <input type="text" placeholder="الرقم اللي حولت منه" required>
            <label style="font-size: 12px; display: block; margin: 5px;">ارفع سكرين شوت التحويل:</label>
            <input type="file" accept="image/*" required>
            <button type="submit" class="sub-btn">تأكيد الاشتراك</button>
        </form>
    </div>

</body>
</html>
