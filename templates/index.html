<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكاية كورة - البث المباشر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #22c55e; margin-bottom: 5px; font-size: 1.8rem; }
        .live-badge { background: red; color: white; padding: 2px 10px; border-radius: 5px; font-size: 0.8em; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
        .match-section { background: #334155; padding: 15px; border-radius: 15px; margin: 20px 0; border: 1px solid #475569; }
        .buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn { padding: 14px; text-decoration: none; border-radius: 12px; font-weight: bold; transition: 0.3s; display: block; border: none; cursor: pointer; }
        .wa-main { background: #25d366; color: white; }
        .wa-support { background: #3b82f6; color: white; }
        .live-btn { background: #facc15; color: #000; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        footer { font-size: 0.75em; margin-top: 30px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ حكاية كورة ⚽</h1>
        <p><span class="live-badge">LIVE</span> منصة البث المباشر للأحداث الرياضية</p>
        
        <div class="match-section">
            <h3 style="margin-top: 0;">📺 جدول مباريات اليوم</h3>
            <p style="font-size: 0.9em; color: #cbd5e1;">شاهد جميع مباريات اليوم بجودة عالية وبدون تقطيع</p>
            <a href="https://www.yalla-shoot.com/" class="btn live-btn" target="_blank">🔥 اضغط هنا لمشاهدة البث المباشر</a>
        </div>

        <div class="buttons">
            <a href="https://wa.me/201040077271" class="btn wa-main" target="_blank">💬 اطلب اشتراكك (واتساب)</a>
            <a href="https://wa.me/201003442771" class="btn wa-support" target="_blank">🛠️ الدعم الفني للمشتركين</a>
        </div>
        
        <footer>جميع الحقوق محفوظة لـ Zack Cinema © 2026</footer>
    </div>
</body>
</html>
