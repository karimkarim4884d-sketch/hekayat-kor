<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايات كورة - النتائج المباشرة</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .match-card {
            background: linear-gradient(145deg, #1a1a1a, #111);
            width: 90%;
            max-width: 450px;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-box {
            color: #ed1c24;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .teams-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }
        .team {
            flex: 1;
        }
        .team-name {
            font-size: 1.1em;
            margin-top: 10px;
        }
        .score {
            font-size: 3.5em;
            font-weight: 800;
            color: #ed1c24;
            flex: 1;
            text-shadow: 0 0 15px rgba(237, 28, 36, 0.4);
        }
        .match-status {
            display: inline-block;
            background: #ed1c24;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8em;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .match-title {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
    </style>
    <meta http-equiv="refresh" content="30">
</head>
<body>

    <div class="match-card">
        <div class="logo-box">HEKAYAT KORA</div>
        
        <div class="match-title">{{ info.title }}</div>
        
        <div class="teams-container">
            <div class="team">
                <div class="team-name">برشلونة</div>
            </div>
            
            <div class="score">{{ info.score }}</div>
            
            <div class="team">
                <div class="team-name">نيوكاسل</div>
            </div>
        </div>

        <div class="match-status">{{ info.status }}</div>
    </div>

</body>
</html>
